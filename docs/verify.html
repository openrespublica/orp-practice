<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Document | OpenResPublica TruthChain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #002147; --navy-deep: #001530; --navy-mid: #003366;
            --gold: #C9A84C; --gold-pale: #FDF3D0; --white: #FAFAF7; --ink: #1A1A2E; --muted: #6B7280;
            --border: rgba(0,33,71,0.1); --success: #1E7A3E; --success-pale: #F0FAF4; --error: #B91C1C;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Source Sans 3', system-ui, sans-serif;
            --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
            --transition-fast: 0.15s ease;
        }

        body {
            background: #F0F2F5; color: var(--ink);
            font-family: var(--font-sans); min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .site-header { background: var(--navy-deep); border-bottom: 3px solid var(--gold); position: relative; overflow: hidden; }
        .header-inner { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 2rem; text-align: center; }
        .republic-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
        .site-header h1 { font-family: var(--font-serif); font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 700; color: #fff; line-height: 1.2; }
        
        main { flex: 1; max-width: 700px; margin: 0 auto; width: 100%; padding: 3rem 1.5rem; }

        /* Verification Card Balance */
        .verify-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,33,71,0.06);
            overflow: hidden; position: relative;
        }
        
        .status-banner { padding: 1.5rem; font-weight: 700; font-size: 1.15rem; letter-spacing: 0.05em; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
        .status-verified { background: var(--success); }
        .status-pending { background: var(--navy-mid); }
        .status-error { background: var(--error); }

        .card-body { padding: 2rem; }
        
        .section-title { font-family: var(--font-serif); font-size: 1.1rem; color: var(--navy-mid); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem; margin-top: 1.75rem;}
        .section-title:first-child { margin-top: 0; }

        .data-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
        @media (min-width: 500px) { .data-grid { grid-template-columns: 1fr 1fr; } }
        
        .data-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .data-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; }
        .data-value { font-size: 0.95rem; color: var(--ink); font-weight: 500; word-break: break-word; }
        .data-mono { font-family: var(--font-mono); font-size: 0.78rem; background: #F1F5F9; padding: 3px 6px; border-radius: 4px; color: var(--navy-mid); border: 1px solid rgba(0,33,71,0.05); }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; background: var(--gold-pale); color: #8a6a14; }

        .crypto-proofs { background: #FAFAF7; padding: 1.5rem; border-radius: 8px; margin-top: 2rem; border: 1px solid var(--border); border-left: 4px solid var(--gold); }
        .crypto-item { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 1.25rem; }
        .crypto-item:last-child { margin-bottom: 0; }
        .crypto-icon { font-size: 1.2rem; line-height: 1; }
        .crypto-text { flex: 1; }
        .crypto-text strong { display: block; font-size: 0.85rem; color: var(--navy-deep); margin-bottom: 0.15rem; }
        .crypto-text span { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); word-break: break-all; }

        /* Manual Fallback Input Form */
        .fallback-form { text-align: left; }
        .fallback-text { font-size: 0.9rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--navy-mid); }
        .form-input { width: 100%; padding: 0.75rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font-mono); font-size: 0.85rem; box-sizing: border-box; background: #fff; }
        .form-input:focus { outline: none; border-color: var(--navy-mid); box-shadow: 0 0 0 3px rgba(0, 33, 102, 0.1); }
        .btn-submit { width: 100%; padding: 0.85rem; background: var(--navy-mid); color: #fff; border: none; border-radius: 8px; font-family: var(--font-sans); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: background var(--transition-fast); }
        .btn-submit:hover { background: var(--navy); }

        /* Animated Loading Asset */
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .footer-nav { margin-top: 2rem; display: flex; justify-content: center; gap: 1rem; }
        .footer-nav a { font-size: 0.85rem; color: var(--navy-mid); text-decoration: none; font-weight: 600; }
        .footer-nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <p class="republic-label">Republic of the Philippines</p>
            <h1>Civic Verification Portal</h1>
        </div>
    </header>

    <main>
        <div class="verify-card" id="card-container">
            <div class="status-banner status-pending">
                <div class="spinner"></div>
                Initializing Security Ledger...
            </div>
        </div>

        <nav class="footer-nav">
            <a href="records.html">← Public Audit Ledger</a>
        </nav>
    </main>

    <script src="assets/verify.js"></script>
</body>
</html>
